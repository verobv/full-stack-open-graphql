name: E2E tests (library)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: library-backend
        run: npm ci

      - name: Install library-frontend dependencies
        working-directory: library-frontend
        run: npm ci

      - name: Install E2E test dependencies
        working-directory: tests-chapter5
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests-chapter5
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        working-directory: tests-chapter5
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests-chapter5/playwright-report/
          retention-days: 7
