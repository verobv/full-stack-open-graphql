name: Test library-backend

on:
  # push:
  #   branches: [ main, master ]
  workflow_dispatch:

env:
  WORK_DIR: "part8"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install library-backend dependencies
        working-directory: ${{ env.WORK_DIR }}/library-backend
        run: npm install

      - name: Install test dependencies
        working-directory: ${{ env.WORK_DIR }}/tests
        run: npm install

      - name: Run tests
        working-directory: ${{ env.WORK_DIR }}/tests
        run: npm test
